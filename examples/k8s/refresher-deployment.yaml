# refresher 角色：周期刷新 token / Device Flow / 健康检查。
# 多副本提供高可用，但靠 Redis 每账号锁保证「每账号单写者」，故无需 1 副本限制。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ghc-proxy-refresher
  labels: { app: ghc-proxy, role: refresher }
spec:
  replicas: 2
  selector:
    matchLabels: { app: ghc-proxy, role: refresher }
  template:
    metadata:
      labels: { app: ghc-proxy, role: refresher }
    spec:
      containers:
        - name: refresher
          image: REGISTRY/ghc-proxy:TAG     # 与 proxy 同一镜像，不同入口
          args: ["node", "dist/credential/refresherMain.js"]
          env:
            - name: ROLE
              value: "refresher"
            - name: DATABASE_URL
              valueFrom: { secretKeyRef: { name: ghc-proxy-secrets, key: database-url } }
            - name: REDIS_URL
              valueFrom: { secretKeyRef: { name: ghc-proxy-secrets, key: redis-url } }
            - name: KAFKA_BROKERS
              valueFrom: { secretKeyRef: { name: ghc-proxy-secrets, key: kafka-brokers } }
            - name: GHC_DATA_KEY_B64
              valueFrom: { secretKeyRef: { name: ghc-proxy-secrets, key: data-key-b64 } }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }
      terminationGracePeriodSeconds: 30
