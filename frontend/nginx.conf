# Admin Console — static SPA + reverse proxy to the GHC Proxy admin API.
#
# The browser talks same-origin: the SPA is served from / and all /admin/*
# calls are proxied to the proxy service, so no CORS is needed and the static
# X-Admin-Token header passes straight through.
#
# Two env vars are templated in at container start by the nginx entrypoint
# (envsubst over /etc/nginx/templates/*.template):
#   PROXY_UPSTREAM        — host:port of the proxy admin API (default proxy:8080)
#   NGINX_LOCAL_RESOLVERS — DNS resolver(s) from /etc/resolv.conf, exported by
#                           the image's 15-local-resolvers.envsh hook.
#
# proxy_pass uses a *variable* plus a resolver so nginx resolves the upstream
# at request time, not at startup — the console therefore starts even if the
# proxy is briefly unresolvable (pod restart, ordering) instead of crashing.

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Reverse-proxy the admin JSON API to the proxy backend.
  location /admin/ {
    resolver ${NGINX_LOCAL_RESOLVERS} valid=10s ipv6=off;
    set $upstream ${PROXY_UPSTREAM};
    # No URI part after the host -> nginx forwards the full original request
    # URI (/admin/...), which is what the backend mounts the admin router at.
    proxy_pass http://$upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # admin requests (device-flow poll) can be slow; allow generous timeouts
    proxy_read_timeout 120s;
  }

  # SPA history fallback: every other path serves index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
