apiVersion: v1
kind: ConfigMap
metadata:
  name: ghc-proxy-config
  namespace: ghc-proxy
data:
  # Non-sensitive runtime config. Upstream identity matches the verified
  # Copilot CLI client. Secrets (DB/Redis URLs, data key, admin token) live in
  # the Secret below, injected as env (GHCPROXY_* overrides these).
  GHCPROXY_SERVER__PORT: "8080"
  GHCPROXY_UPSTREAM__INTEGRATION_ID: "copilot-developer-cli"
  GHCPROXY_UPSTREAM__EDITOR_VERSION: "copilot/1.0.61"
  GHCPROXY_UPSTREAM__API_VERSION: "2026-06-01"
  GHCPROXY_UPSTREAM__DEFAULT_API_BASE: "https://api.enterprise.githubcopilot.com"
  GHCPROXY_KAFKA__ENABLED: "true"
  GHCPROXY_REFRESH__SCAN_INTERVAL_S: "60"
---
# PLACEHOLDER Secret. Real values must be injected via CI/CD, sealed-secrets,
# or External Secrets — never committed. data-key-b64 must be a 32-byte key.
apiVersion: v1
kind: Secret
metadata:
  name: ghc-proxy-secrets
  namespace: ghc-proxy
type: Opaque
stringData:
  GHCPROXY_POSTGRES__URL: "postgresql://USER:PASS@PG_HOST:5432/ghcproxy"
  GHCPROXY_REDIS__URL: "redis://REDIS_HOST:6379/0"
  GHCPROXY_KAFKA__BROKERS: '["KAFKA_HOST:9092"]'
  GHCPROXY_CRYPTO__DATA_KEY_B64: "<BASE64_32_BYTE_KEY_PLACEHOLDER>"
  GHCPROXY_ADMIN_TOKEN: "<ADMIN_TOKEN_PLACEHOLDER>"
