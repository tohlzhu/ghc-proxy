# proxy role: stateless ingress, horizontally scaled by HPA.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ghc-proxy
  namespace: ghc-proxy
  labels: { app: ghc-proxy, role: proxy }
spec:
  replicas: 3
  selector:
    matchLabels: { app: ghc-proxy, role: proxy }
  template:
    metadata:
      labels: { app: ghc-proxy, role: proxy }
    spec:
      containers:
        - name: proxy
          image: REGISTRY/ghc-proxy:TAG        # set by CI
          env:
            - name: ROLE
              value: "proxy"
          envFrom:
            - configMapRef: { name: ghc-proxy-config }
            - secretRef: { name: ghc-proxy-secrets }
          ports: [{ containerPort: 8080 }]
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "512Mi" }
          lifecycle:
            preStop: { exec: { command: ["sleep", "10"] } }  # drain in-flight streams
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ghc-proxy
  namespace: ghc-proxy
spec:
  selector: { app: ghc-proxy, role: proxy }
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ghc-proxy
  namespace: ghc-proxy
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: ghc-proxy }
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 65 }
